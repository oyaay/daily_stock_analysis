name: 每日股票分析

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(env.ANALYSIS_TIMEOUT_MINUTES || vars.ANALYSIS_TIMEOUT_MINUTES || '30') }}

    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 60))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建目录
        run: mkdir -p data logs reports

      # ✅ 核心：加载仓库配置
      - name: 加载配置文件
        run: |
          if [ -f config/runtime.env ]; then
            echo "📦 加载 config/runtime.env"
            cat config/runtime.env >> $GITHUB_ENV
          else
            echo "⚠️ 未找到 config/runtime.env，使用默认配置"
          fi

      - name: 执行股票分析
        env:
          # ================= AI =================
          LITELLM_CONFIG: ${{ env.LITELLM_CONFIG || vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}
          LITELLM_CONFIG_YAML: ${{ env.LITELLM_CONFIG_YAML || vars.LITELLM_CONFIG_YAML || secrets.LITELLM_CONFIG_YAML }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MODEL: ${{ env.LITELLM_MODEL || vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ env.GEMINI_MODEL || vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ env.GEMINI_MODEL_FALLBACK || vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          GEMINI_REQUEST_DELAY: ${{ env.GEMINI_REQUEST_DELAY || '3.0' }}

          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}

          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ env.OPENAI_BASE_URL || vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ env.OPENAI_MODEL || vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}

          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ env.ANTHROPIC_MODEL || vars.ANTHROPIC_MODEL || secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}

          # ================= 数据源 =================
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

          LONGBRIDGE_APP_KEY: ${{ secrets.LONGBRIDGE_APP_KEY }}
          LONGBRIDGE_APP_SECRET: ${{ secrets.LONGBRIDGE_APP_SECRET }}
          LONGBRIDGE_ACCESS_TOKEN: ${{ secrets.LONGBRIDGE_ACCESS_TOKEN }}
          LONGBRIDGE_REGION: ${{ env.LONGBRIDGE_REGION || vars.LONGBRIDGE_REGION || secrets.LONGBRIDGE_REGION }}
          LONGBRIDGE_HTTP_URL: ${{ env.LONGBRIDGE_HTTP_URL || vars.LONGBRIDGE_HTTP_URL || secrets.LONGBRIDGE_HTTP_URL }}
          LONGBRIDGE_QUOTE_WS_URL: ${{ env.LONGBRIDGE_QUOTE_WS_URL || vars.LONGBRIDGE_QUOTE_WS_URL || secrets.LONGBRIDGE_QUOTE_WS_URL }}
          LONGBRIDGE_TRADE_WS_URL: ${{ env.LONGBRIDGE_TRADE_WS_URL || vars.LONGBRIDGE_TRADE_WS_URL || secrets.LONGBRIDGE_TRADE_WS_URL }}

          # ================= 搜索 =================
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          MINIMAX_API_KEYS: ${{ secrets.MINIMAX_API_KEYS }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          SEARXNG_BASE_URLS: ${{ secrets.SEARXNG_BASE_URLS }}
          SEARXNG_PUBLIC_INSTANCES_ENABLED: ${{ env.SEARXNG_PUBLIC_INSTANCES_ENABLED || vars.SEARXNG_PUBLIC_INSTANCES_ENABLED || secrets.SEARXNG_PUBLIC_INSTANCES_ENABLED }}

          # ================= 通知 =================
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: ${{ env.WECHAT_MSG_TYPE || vars.WECHAT_MSG_TYPE || secrets.WECHAT_MSG_TYPE || 'markdown' }}

          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          EMAIL_SENDER: ${{ env.EMAIL_SENDER || vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ env.EMAIL_RECEIVERS || vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}

          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

          # ================= ⭐核心配置（已工程化）=================
          STOCK_LIST: ${{ env.STOCK_LIST || vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          MARKET_REVIEW_REGION: ${{ env.MARKET_REVIEW_REGION || vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'cn' }}

          REPORT_TYPE: ${{ env.REPORT_TYPE || vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          REPORT_LANGUAGE: ${{ env.REPORT_LANGUAGE || vars.REPORT_LANGUAGE || secrets.REPORT_LANGUAGE || '' }}
          SINGLE_STOCK_NOTIFY: ${{ env.SINGLE_STOCK_NOTIFY || vars.SINGLE_STOCK_NOTIFY || secrets.SINGLE_STOCK_NOTIFY || 'false' }}
          MARKET_REVIEW_ENABLED: ${{ env.MARKET_REVIEW_ENABLED || vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}
          ANALYSIS_DELAY: ${{ env.ANALYSIS_DELAY || vars.ANALYSIS_DELAY || secrets.ANALYSIS_DELAY || '0' }}
          TRADING_DAY_CHECK_ENABLED: ${{ env.TRADING_DAY_CHECK_ENABLED || vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}

          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ env.MAX_WORKERS || vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}
          ENABLE_CHIP_DISTRIBUTION: ${{ env.ENABLE_CHIP_DISTRIBUTION || vars.ENABLE_CHIP_DISTRIBUTION || secrets.ENABLE_CHIP_DISTRIBUTION || 'false' }}
          REALTIME_SOURCE_PRIORITY: ${{ env.REALTIME_SOURCE_PRIORITY || vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}

        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"

          echo "=========================================="
          echo "🚀 股票分析启动"
          echo "=========================================="
          echo "时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "模式: $MODE"
          echo "股票: $STOCK_LIST"
          echo "=========================================="

          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi

      - name: 上传报告
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: 输出结果
        if: always()
        run: |
          echo "=========================================="
          echo "📊 分析完成"
          echo "=========================================="
          ls -la reports/ 2>/dev/null || echo "无报告"
